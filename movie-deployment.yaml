apiVersion: apps/v1
kind: Deployment
metadata:
  name: movie-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: movie-app
  template:
    metadata:
      labels:
        app: movie-app
    spec:
      containers:
        - name: movie-app
          image: harelv04/movie-api:v1
          ports:
            - containerPort: 3000